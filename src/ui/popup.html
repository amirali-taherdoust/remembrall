<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Security Gate</title>
    <style>
      body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial; margin: 0; width: 360px; }
      .wrap { padding: 12px; }
      h2 { font-size: 16px; margin: 0 0 10px; }
      .row { display: flex; gap: 8px; }
      .card { border: 1px solid #e6e8f0; border-radius: 12px; padding: 10px; margin-bottom: 10px; }
      .k { color: #666; font-size: 12px; }
      .v { font-size: 18px; font-weight: 700; }
      button { border: 1px solid #d7d9e6; background: #fff; border-radius: 10px; padding: 8px 10px; cursor: pointer; font-weight: 600; }
      button:hover { background: #fafbff; }
      .danger { border-color: #f1b4b4; background: #fff5f5; }
      .danger:hover { background: #ffecec; }
      .list { max-height: 140px; overflow: auto; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; font-size: 12px; color: #333; white-space: pre; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h2>Security Gate</h2>

      <div class="row">
        <div class="card" style="flex:1">
          <div class="k">Whitelist</div>
          <div class="v" id="wCount">0</div>
        </div>
        <div class="card" style="flex:1">
          <div class="k">Blacklist</div>
          <div class="v" id="bCount">0</div>
        </div>
      </div>

      <div class="card">
        <div class="k">Whitelist domains</div>
        <div class="list" id="wList"></div>
      </div>
      <div class="card">
        <div class="k">Blacklist domains</div>
        <div class="list" id="bList"></div>
      </div>

      <div class="row">
        <button id="btnClearWhite">Clear whitelist</button>
        <button class="danger" id="btnClearBlack">Clear blacklist</button>
      </div>
    </div>

    <script type="module" src="./popup.js"></script>
  </body>
</html>
